# Buddies — Continuous Integration
# Runs on every push and pull request: install, typecheck, lint, build.
# Expand as the project grows (tests, prisma generate with secrets, etc.).

name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Node 20, pnpm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Reads the pnpm version from package.json#packageManager (pnpm@9.12.0).
        # Don't set `version:` here — pnpm/action-setup@v4 errors on duplicate sources.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
